<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Character and Word Counter</title>

        <style>
            body {
                font-family: system-ui, sans-serif;
                margin: 0;
                background-color: #FFFCF0;
                color: #100F0F;
                font-weight: 350;
                min-height: 100vh;
                display: grid;
                grid-template-rows: auto 1fr auto;
            }
            .header {
                text-align: center;
            }
            .header h1 {
                font-size: 13pt;
                font-weight: 450;
                margin: 40px 0 8px 0;
            }
            .header p {
                font-size: 11pt;
                margin: 0;
            }
            .counter {
                width: 90%;
                max-width: 700px;
                justify-self: center;
                align-self: center;
            }
            textarea {
                width: 100%;
                height: 350px;
                box-sizing: border-box;
                border: 1px solid #E6E4D9;
                border-radius: 6px;
                background: #FFFCF0;
                color: #100F0F;
                resize: none;
                font: inherit;
                font-size: 11pt;
                padding: 20px;
                margin-bottom: 10px;
            }
            textarea:focus {
                outline: none;
                border-color: #DA702C;
                box-shadow: 0 0 0 3px rgba(218, 112, 44, 0.2);
            }
            .stats {
                display: flex;
                flex-direction: column;
                gap: 8px; 
                margin-top: 10px;
            }
            .stat {
                display: flex;
                align-items: center;
                font-variant-numeric: tabular-nums;
            }
            .count-icon {
                flex-shrink: 0;
                display: block;
                margin-right: 10px;
            }
            .footer {
                text-align: center;
                margin-bottom: 40px;
                font-size: 8pt;
            }
            a {
                color: #DA702C;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <h1><span style="color:#DA702C">count</span>.sjen.uk</h1>
            <p>literally just a character and word counter</p>
        </div>
        <div class="counter">
            <textarea id="text" placeholder="type or paste your text here"></textarea>
            <div class="stats">
                <span class="stat">
                    <svg width="12" height="12" viewBox="0 0 36 36" aria-hidden="true" class="count-icon">
                        <circle cx="18" cy="18" r="14.2" fill="#4385BE"/>
                    </svg>
                    <span id="char">0</span>&nbsp;characters
                </span>
                <span class="stat">
                    <svg width="12" height="12" viewBox="0 0 36 36" aria-hidden="true" class="count-icon">
                        <rect x="3.8" y="3.8" width="28.4" height="28.4" rx="4.2" fill="#3AA99F"/>
                    </svg>
                    <span id="word">0</span>&nbsp;words
                </span>
            </div>
        </div>
        <div class="footer">
            <p>made by <a href="https://sebastienjensen.uk">Sebastien Jensen</a></p>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const textArea = document.getElementById("text");
                const charCountDisplay = document.getElementById("char");
                const wordCountDisplay = document.getElementById("word");

                textArea.addEventListener("input", () => {
                    const text = textArea.value;
                    charCountDisplay.textContent = text.length;
                    const words = text.match(/\S+/g) || [];
                    wordCountDisplay.textContent = words.length;
                });
            });
        </script>
    </body>
</html>
